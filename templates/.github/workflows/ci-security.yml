name: CI — Security & Quality

# Template AIDLC — Copiar a .github/workflows/ci-security.yml en tu proyecto
# Adaptar según el stack: ver docs/04-playbooks/ para versiones específicas

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # para subir resultados de CodeQL

jobs:
  # ──────────────────────────────────────────
  # GATE 1: Scan de secrets — corre primero, falla rápido
  # ──────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historia completa para detectar secrets en commits previos

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # GATE 2: Lint y formato
  # ──────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      # Adaptar según el lenguaje del proyecto:

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Lint (Python)
        run: |
          pip install ruff
          ruff check src/ tests/
          ruff format --check src/ tests/

      # Node.js (descomentar si es proyecto Node)
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: npm
      # - run: npm ci
      # - run: npm run lint
      # - run: npm run format:check

  # ──────────────────────────────────────────
  # GATE 3: Auditoría de dependencias
  # ──────────────────────────────────────────
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc --severity high
        # Falla solo para vulnerabilidades HIGH o CRITICAL

      # Node.js (descomentar si es proyecto Node)
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: npm
      # - run: npm ci
      # - run: npm audit --audit-level=high

  # ──────────────────────────────────────────
  # GATE 4: Tests con cobertura mínima
  # ──────────────────────────────────────────
  tests:
    name: Tests & Coverage (≥70%)
    runs-on: ubuntu-latest
    needs: [lint, dependency-audit]

    services:
      # Adaptar o eliminar según el stack
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ vars.TEST_DB_NAME || 'test_db' }}
          POSTGRES_USER: ${{ vars.TEST_DB_USER || 'test_user' }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'test_password' }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Nunca secrets reales aquí — solo vars de test
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      SECRET_KEY: test-key-not-for-production-use
      ENVIRONMENT: test
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests with coverage enforcement
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────
  # GATE 5: Análisis estático de seguridad (SAST)
  # Solo en push a main o PRs — no en cada commit
  # ──────────────────────────────────────────
  codeql:
    name: CodeQL SAST Analysis
    runs-on: ubuntu-latest
    needs: [secret-scan]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python  # cambiar a javascript, typescript según proyecto
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ──────────────────────────────────────────
  # GATE 6: Build de imagen Docker
  # Solo en push a main (post-merge)
  # ──────────────────────────────────────────
  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [tests, codeql]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1  # falla si hay vulnerabilidades HIGH o CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ──────────────────────────────────────────
  # DEPLOY A STAGING — solo en push a main, todos los gates verdes
  # ──────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Implementar deploy según proveedor:"
          echo "  Railway: railway up --environment staging"
          echo "  Render: curl -X POST RENDER_DEPLOY_HOOK"
          echo "  AWS ECS: aws ecs update-service ..."
          echo "  Fly.io: fly deploy --config fly.staging.toml"
        env:
          DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}

      - name: Wait for deployment
        run: sleep 45

      - name: Smoke test staging
        run: |
          curl --fail --retry 3 --retry-delay 10 ${{ vars.STAGING_URL }}/health
          echo "Staging health check passed"
